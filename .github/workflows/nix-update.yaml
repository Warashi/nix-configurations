name: Update Nix Flake Inputs

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 16 * * *" # Every day at 16:00 UTC = 01:00 JST

permissions: {}

jobs:
  update-flake-inputs:
    runs-on: ubuntu-slim
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          extra_nix_config: |
            accept-flake-config = true
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.NIX_UPDATER_APP_ID }}
          private-key: ${{ secrets.NIX_UPDATER_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Prepare git
        run: |
          git config user.name "warashi-nix-updater[bot]"
          git config user.email "265781387+warashi-nix-updater[bot]@users.noreply.github.com"
          git switch -c "update-flake-inputs"
      - name: Update flake inputs
        run: nix flake update
      - name: Commit and create pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Update flake inputs"
            git push --force origin HEAD
            gh pr create --title "Update flake inputs" --body "This PR updates the flake inputs to their latest versions." && gh pr merge --auto --merge || echo "PR is already open"
          else
            echo "No changes to commit"
          fi
